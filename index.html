<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFC Web Tool</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>

<h1>NFC Web Tool</h1>

<div class="card">
    <h2>Create NFC Link</h2>
    <input type="text" id="urlInput" placeholder="Enter URL (https://...)">
    <button onclick="writeNFC()">Write to NFC</button>
</div>

<div class="card">
    <h2>Scan NFC</h2>
    <button onclick="scanNFC()">Scan Tag</button>
    <p id="scanResult"></p>
</div>

<script src="app.js"></script>
</body>
</html>
